apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fraud-scoring
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - fraud-scoring
  selector:
    matchLabels:
      helm.toolkit.fluxcd.io/name: fraud-scoring
  endpoints:
    - targetPort: http-metrics
      path: /metrics
      interval: 15s
